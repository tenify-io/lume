version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: blank-imports
        - name: unreachable-code
        - name: dot-imports
    gocritic:
      enabled-tags:
        - diagnostic
        - style

  exclusions:
    paths:
      - frontend
      - build
      - node_modules
